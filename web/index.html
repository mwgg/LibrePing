      <section style="max-width: 640px; margin: 48px auto; padding: 0 20px; font-family: system-ui, sans-serif; line-height: 1.55">
        <h1>LibrePing — decentralized uptime monitoring</h1>
        <p>
          LibrePing is a free, open-source, peer-to-peer uptime monitor. It checks whether websites and
          services are online from many locations around the world at once and shows where they are
          reachable from on a live map. There is no central server: independent operators run the nodes
          and federate directly with each other. Every measurement is cryptographically signed and
          verified by every hub.
        </p>
        <p>
          Regular users need no server and no signup — your browser holds your key and you add monitors
          and encrypted alerts. Have a spare VPS or NAS? Run a probe to lend a vantage point, or a hub to
          host a dashboard and join the mesh.
        </p>
        <p>This dashboard needs JavaScript. Learn more or self-host: <a href="https://github.com/mwgg/LibrePing">github.com/mwgg/LibrePing</a></p>
      </section>
    </noscript>
