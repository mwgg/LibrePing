server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Defense-in-depth browser hardening. The account seed lives in
    # localStorage (no-signup model), so an XSS would be high-impact; these
    # headers contain the blast radius even if injection slips through.
    #
    # CSP notes: the only third-party origins are the map tile/style hosts. The
    # default basemap is OpenFreeMap (VITE_MAP_STYLE default
    # https://tiles.openfreemap.org/styles/positron), which serves the style
    # JSON, vector tiles, glyphs (connect-src) and sprite images (img-src) all
    # from tiles.openfreemap.org; the MapLibre demo host is also allowed so the
    # old default still works. MapLibre GL renders in a worker created from a
    # blob URL (worker-src blob:) and injects its own stylesheet (style-src
    # 'unsafe-inline'). If you point VITE_MAP_STYLE at a different tile provider,
    # add its origin to img-src and connect-src here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; worker-src 'self' blob:; img-src 'self' data: blob: https://demotiles.maplibre.org https://tiles.openfreemap.org; connect-src 'self' https://demotiles.maplibre.org https://tiles.openfreemap.org; style-src 'self' 'unsafe-inline'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Proxy API calls to the hub so the dashboard and API share an origin.
    location /api/ {
        proxy_pass http://hub:8080;
        proxy_set_header Host $host;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
